<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sa Balai Lake View Resort — Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── Reset ────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: #F8FAF8; overflow: hidden; color: #003E00; transition: background 0.25s ease, color 0.25s ease; }

    /* ── Scrollbar ─────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #C8DCC8; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #A8C4A8; }

    /* ── Form controls ─────────────────────────────── */
    input[type=date]::-webkit-calendar-picker-indicator,
    input[type=time]::-webkit-calendar-picker-indicator { filter: invert(0.4) sepia(1) hue-rotate(80deg) saturate(0.8); }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
    option { background: #FFFFFF; color: #003E00; }

    /* ── Animations ─────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.4 } }
    @keyframes fadeSlideUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* ── App shell ──────────────────────────────────── */
    .app-shell { display:flex; height:100vh; color:#003E00; font-family:'DM Sans',sans-serif; overflow:hidden; transition:background 0.25s ease,color 0.25s ease; }
    .sidebar { width:220px; border-right:1px solid #E2EAE2; display:flex; flex-direction:column; flex-shrink:0; transition:background 0.25s ease,border-color 0.25s ease; }
    .main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; transition:background 0.25s ease; }
    .page-scroll { flex:1; overflow-y:auto; padding:24px 26px; }

    /* ── Grid layouts ───────────────────────────────── */
    .dashboard-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:18px; }
    .two-col-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
    .order-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; min-height:420px; height:56vh; }
    .pool-grid { display:grid; grid-template-columns:minmax(200px,220px) minmax(0,1fr); gap:16px; }
    .pool-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; align-content:start; }
    .inventory-table { min-width:680px; }
    .responsive-table-wrap { overflow-x:auto; border-radius:12px; }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 760px) {
      body { overflow:auto; }
      .app-shell { flex-direction:column; min-height:100vh; height:auto; overflow:visible; }
      .sidebar { width:100%; max-height:none; border-right:none; }
      .sidebar nav { display:flex; overflow-x:auto; padding:8px 10px; }
      .sidebar nav > * { flex:0 0 auto; }
      .main-content { min-height:0; overflow:visible; }
      .page-scroll { overflow:visible; padding:16px 14px 24px; }
      .app-header { align-items:flex-start !important; gap:8px; padding:12px 14px !important; }
      .dashboard-stats, .two-col-grid, .order-grid, .pool-grid { grid-template-columns:1fr; height:auto; }
      .pool-cards { grid-template-columns:1fr; }
    }
  </style>
</head>

    async function fetchFromCloud() {
      if (!db) return null;
      const { data, error } = await db.from('resort_state').select('data, updated_at').eq('id', RECORD_ID).maybeSingle();
      if (error) throw error;
      return data;
    }
    async function saveToCloud(state) {
      if (!db) return;
      const { error } = await db.from('resort_state').upsert({ id: RECORD_ID, data: state, last_session: SESSION_ID, updated_at: new Date().toISOString() });
      if (error) throw error;
    }
    function timeSince(iso) {
      if (!iso) return null;
      const s = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (s < 10) return 'just now';
      if (s < 60) return `${s}s ago`;
      if (s < 3600) return `${Math.floor(s / 60)}m ago`;
      return `${Math.floor(s / 3600)}h ago`;
    }

    // ── localStorage helpers ─────────────────────────────────────
    const LS_KEY = 'sabalai_v2';
    const isPlainObject = (v) => v && typeof v === 'object' && !Array.isArray(v);
    const safeArray = (v, fallback=[]) => Array.isArray(v) ? v : fallback;
    const clampNumber = (v, min=0, fallback=0) => { const n = Number(v); return Number.isFinite(n) ? Math.max(min, n) : fallback; };
    const validDateValue = (value) => { if (!value || typeof value !== 'string') return false; const d = new Date(`${value}T00:00:00`); return !Number.isNaN(d.getTime()); };

    const createStateSnapshot = (state) => JSON.stringify({
      rooms: safeArray(state.rooms),
      tables: safeArray(state.tables),
      orders: safeArray(state.orders),
      orderHistory: safeArray(state.orderHistory),
      inventory: safeArray(state.inventory),
      stockHistory: safeArray(state.stockHistory),

      cruises: safeArray(state.cruises),

    function normalizeState(raw) {
      if (!isPlainObject(raw)) return null;
      const rooms = safeArray(raw.rooms, initRooms).map((r, idx) => ({
        ...initRooms[idx % initRooms.length],
        checkInTime: null, checkOutTime: null,
        ...(isPlainObject(r) ? r : {})
      })).filter(r => r.id && r.number);
      const tables = safeArray(raw.tables, initTables).map((t, idx) => ({ ...initTables[idx % initTables.length], ...(isPlainObject(t) ? t : {}) })).filter(t => t.id && t.number);
      const seenOrderIds = new Set();
      const orders = safeArray(raw.orders, initOrders).filter(isPlainObject).map(o => ({
        id: o.id || Date.now() + Math.random(), tableId: Number(o.tableId),
        items: safeArray(o.items).filter(isPlainObject).map(i => ({ mid: Number(i.mid), qty: clampNumber(i.qty, 1, 1) })).filter(i => Number.isFinite(i.mid)),
        status: ['preparing','serving','served','billed'].includes(o.status) ? o.status : 'preparing',
        time: o.time || '',
      })).filter(o => { if (!o.tableId || !o.items.length || seenOrderIds.has(o.id)) return false; seenOrderIds.add(o.id); return true; });

      const seenHistoryIds = new Set();
      const orderHistory = safeArray(raw.orderHistory, []).filter(isPlainObject).map((o, idx) => ({
        id: o.id || Date.now() + idx, tableId: Number(o.tableId) || 0,
        items: safeArray(o.items).filter(isPlainObject).map(i => ({ mid: Number(i.mid), qty: clampNumber(i.qty, 1, 1) })).filter(i => Number.isFinite(i.mid)),
        status: o.status || 'billed', time: o.time || '', billedAt: o.billedAt || '',
      })).filter(o => { if (seenHistoryIds.has(o.id)) return false; seenHistoryIds.add(o.id); return true; });

      const inventory = safeArray(raw.inventory, initInventory).filter(isPlainObject).map((i, idx) => ({
        id: i.id || Date.now() + idx, name: String(i.name || '').trim(), dept: i.dept || 'Housekeeping',
        qty: clampNumber(i.qty, 0, 0), min: clampNumber(i.min, 0, 0), unit: String(i.unit || '').trim(),
        archived: i.archived === true,
      })).filter(i => i.name);
      initInventory.forEach(seed => { if (!inventory.some(i => itemKey(i.name) === itemKey(seed.name))) inventory.push(seed); });

      const stockHistory = safeArray(raw.stockHistory, initStockHistory).filter(isPlainObject).map((h, idx) => ({
        id: h.id || Date.now() + idx, itemName: String(h.itemName || h.name || '').trim(), dept: h.dept || 'Bar',
        qty: Number.isFinite(Number(h.qty)) ? Number(h.qty) : 0, unit: h.unit || '',
        type: h.type || 'adjustment', note: h.note || '', time: h.time || new Date().toISOString(),
      })).filter(h => h.itemName);

      const poolRaw = isPlainObject(raw.pool) ? raw.pool : initPool;
      const pool = {
        ...initPool, ...poolRaw,
        curGuests: clampNumber(poolRaw.curGuests, 0, initPool.curGuests),
        maxCap: clampNumber(poolRaw.maxCap, 1, initPool.maxCap),
        passes: safeArray(poolRaw.passes).filter(isPlainObject).map((p, idx) => ({ id: p.id || Date.now() + idx, name: String(p.name || 'Guest').trim(), count: clampNumber(p.count, 1, 1), time: p.time || '', type: p.type || 'Day Pass' })),

      };
      pool.curGuests = Math.min(pool.curGuests, pool.maxCap);

      // artificially override a legitimately saved cost. The calculator enforces
      // minimum 1500 at booking time; the normalizer just needs to prevent NaN.
      const cruises = safeArray(raw.cruises, []).filter(isPlainObject).map(c => ({
        id: c.id || Date.now() + Math.random(),
        name: String(c.name || '').trim(),
        date: c.date || today,
        time: c.time || '08:00',
        heads: clampNumber(c.heads, 1, 1),
        cost: clampNumber(c.cost, 0, 0)
      })).filter(c => c.name);

      return { rooms, tables, orders, orderHistory, inventory, stockHistory, pool, cruises, _savedAt: raw._savedAt || null };
    }

      const clean = normalizeState(state) || state;
      const data = JSON.stringify({ ...clean, _version:'2.3', _exportedAt: new Date().toISOString(), _resort:'Sa Balai Lake View Resort' }, null, 2);
      const blob = new Blob([data], { type:'application/json' }); const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `sabalai-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url);
    }
    function importBackup(file, cb) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(e.target.result);
          if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) { alert('❌ Invalid backup file.\nExpected a JSON object exported from Sa Balai.'); return; }
          if (!parsed.rooms && !parsed.tables && !parsed.pool) { alert('❌ This file does not appear to be a Sa Balai backup.\nMissing fields.'); return; }
          cb(parsed);
        } catch(err) { alert('❌ Could not parse backup file.'); }
      };
      reader.readAsText(file);

    const initStockHistory = [
      { id:1, itemName:"Bar inventory seed", dept:"Bar", qty:0, unit:"", type:"system", note:"Loaded beverage counter inventory", time:new Date().toISOString() },

    // ── Utility functions ─────────────────────────────────────────
    // BUG-06 / BUG-09 FIX: safeArray guard prevents .reduce() crash on null/undefined items
    const calcTotal = (items) => safeArray(items).reduce((s, i) => { const m = getMenuItem(i.mid); return s + (m && m.price > 0 ? m.price * i.qty : 0); }, 0);
    const itemKey = (name) => String(name || '').trim().toLowerCase();
    const isBarMenuItem = (menuId) => { const m = getMenuItem(menuId); return m && BAR_MENU_CATS.includes(m.cat); };
    const getRecipe = (menuId) => BAR_RECIPES[Number(menuId)] || [];
    const getStockColor = (item) => { if (!item || item.qty <= 0) return '#C0392B'; if (item.qty < item.min) return '#B8860B'; return '#007A00'; };
    // BUG-04 / BUG-05 FIX: exclude archived items from recipe stock lookups
    function getInventoryIngredient(inventory, name) { const key = itemKey(name); return inventory.find(i => !i.archived && itemKey(i.name) === key && i.dept === 'Bar') || inventory.find(i => !i.archived && itemKey(i.name) === key); }
    function getRecipeRequirements(orderItems) {
      const req = {};
      safeArray(orderItems).forEach(item => { const qty = clampNumber(item.qty, 1, 1); getRecipe(item.mid).forEach(ing => { const key = itemKey(ing.name); if (!req[key]) req[key] = { ...ing, qty:0 }; req[key].qty += ing.qty * qty; }); });
      return Object.values(req);
    }
    function getRecipeIssues(orderItems, inventory) {
      return getRecipeRequirements(orderItems).map(req => { const stock = getInventoryIngredient(inventory, req.name); const available = stock ? clampNumber(stock.qty, 0, 0) : 0; return { ...req, available, missing:!stock, itemId:stock?.id }; }).filter(req => req.missing || req.available < req.qty);
    }
    // BUG-04 FIX: never deduct from archived items — they are retired and must not be mutated
    function applyRecipeConsumption(inventory, orderItems) {
      const reqs = getRecipeRequirements(orderItems);
      return inventory.map(item => {
        if (item.archived) return item;
        const req = reqs.find(r => itemKey(r.name) === itemKey(item.name) && item.dept === 'Bar');
        return req ? { ...item, qty: Math.max(0, clampNumber(item.qty, 0, 0) - req.qty) } : item;
      });
    }
    function buildConsumptionHistory(orderItems, inventorySnapshot, tableId) {
      const now = new Date().toISOString();
      return getRecipeRequirements(orderItems).map((req, idx) => ({ id: Date.now() + idx, itemName: req.name, dept: 'Bar', qty: -req.qty, unit: req.unit, type: 'consumption', note: `Table ${tableId} drink order`, time: now }));
    }

    function parseTimeToMinutes(timeStr) {
      if (!timeStr) return -1;
      const parts = timeStr.split(':').map(Number);
      return (parts[0] || 0) * 60 + (parts[1] || 0);
    }
    function timesOverlap(start1, end1, start2, end2) {
      const s1 = parseTimeToMinutes(start1); if (s1 < 0) return false;
      const s2 = parseTimeToMinutes(start2); if (s2 < 0) return false;
      const e1 = end1 ? parseTimeToMinutes(end1) : s1 + 120;
      const e2 = end2 ? parseTimeToMinutes(end2) : s2 + 120;
      return s1 < e2 && s2 < e1;
    }
    function datesOverlap(s1, e1, s2, e2) {
      if (!s1 || !e1 || !s2 || !e2) return false;
      return new Date(s1 + 'T00:00:00') < new Date(e2 + 'T00:00:00') && new Date(s2 + 'T00:00:00') < new Date(e1 + 'T00:00:00');
    }

    function Modal({ title, onClose, children, wide }) {
      const modalRef = useRef(null);
      useEffect(() => {
        const previous = document.activeElement;
        const onKey = (e) => {
          if (e.key === 'Escape') onClose();
          if (e.key !== 'Tab' || !modalRef.current) return;
          const focusable = modalRef.current.querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])');
          if (!focusable.length) return;
          const first = focusable[0]; const last = focusable[focusable.length - 1];
          if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
          else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
        };
        document.body.style.overflow = 'hidden';
        document.addEventListener('keydown', onKey);
        setTimeout(() => { const first = modalRef.current?.querySelector('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])'); first?.focus(); }, 0);
        return () => { document.body.style.overflow = ''; document.removeEventListener('keydown', onKey); previous?.focus?.(); };
      }, [onClose]);
      return (
        <div role="presentation" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }} style={{ position:"fixed",inset:0,background:"rgba(0,31,16,0.40)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,backdropFilter:"blur(6px)",padding:12 }}>

    // ── Hotel ─────────────────────────────────────────────────────
    function HotelView({ rooms, setRooms, pool, setPool }) {
      const [sel,  setSel]  = useState(null);
      const [mode, setMode] = useState(null);
      const [form, setForm] = useState({ guest:"", checkIn:today, checkInTime:"14:00", checkOut:"", checkOutTime:"12:00", rate:0 });
      const [filter, setFilter] = useState("all");
      const [warn, setWarn] = useState(null);

      const upd   = (id, data) => setRooms(p => p.map(r => r.id === id ? { ...r, ...data } : r));
      const close = () => { setSel(null); setMode(null); setWarn(null); };

      const doCheckIn = () => {
        if (!sel || !form.guest.trim() || !form.checkIn || !form.checkOut) return;
        upd(sel.id, { status:"occupied", guest:form.guest.trim(), checkIn:form.checkIn, checkInTime:form.checkInTime, checkOut:form.checkOut, checkOutTime:form.checkOutTime, rate:Number(form.rate) });
        close();
      };

      const doReserve = () => {
        if (!sel || !form.guest.trim() || !form.checkIn || !form.checkOut) return;
        upd(sel.id, { status:"reserved", guest:form.guest.trim(), checkIn:form.checkIn, checkInTime:form.checkInTime, checkOut:form.checkOut, checkOutTime:form.checkOutTime, rate:Number(form.rate) });
        close();
      };

      const doCheckOut = (room) => {
        const guestKey = (room.guest || '').trim().toLowerCase();
        const matching = pool.passes.filter(p => {
          const pKey = p.name.trim().toLowerCase();
          return guestKey && (pKey.includes(guestKey) || guestKey.includes(pKey));
        });
        if (matching.length > 0) {
          const totalCount = matching.reduce((s, p) => s + p.count, 0);
          setWarn({
            message: `Found ${matching.length} pool pass(es) for "${room.guest}" (${totalCount} guest${totalCount !== 1 ? 's' : ''}). Remove them from the pool?`,
            confirmLabel: "Yes, check out + remove passes",
            cancelLabel: "Check out only",
            onConfirm: () => {
              setPool(prev => ({ ...prev, curGuests: Math.max(0, prev.curGuests - totalCount), passes: prev.passes.filter(p => !matching.find(mp => mp.id === p.id)) }));
              upd(room.id, { status:"available", guest:null, checkIn:null, checkOut:null, checkInTime:null, checkOutTime:null });
              setWarn(null); setSel(null); setMode(null);
            },
            onCancel: () => {
              upd(room.id, { status:"available", guest:null, checkIn:null, checkOut:null, checkInTime:null, checkOutTime:null });
              setWarn(null); setSel(null); setMode(null);
            },
          });
        } else {
          upd(room.id, { status:"available", guest:null, checkIn:null, checkOut:null, checkInTime:null, checkOutTime:null });
          close();
        }
      };

      return (
        <div>
          <div style={{ display:"flex",gap:7,marginBottom:18,flexWrap:"wrap" }}>
            {["all","available","occupied","reserved","maintenance"].map(f => (
              <button key={f} onClick={() => setFilter(f)} style={{ padding:"5px 14px",borderRadius:20,border:`1px solid ${filter===f?"#003E00":BORD}`,cursor:"pointer",fontSize:12,background:filter===f?"#003E00":SURF2,color:filter===f?"#FFFFFF":T3,textTransform:"capitalize",fontFamily:"'DM Sans',sans-serif",fontWeight:filter===f?600:400,transition:"all 0.15s ease" }}>
                {f === "all" ? `All (${rooms.length})` : `${f} (${rooms.filter(r => r.status === f).length})`}
              </button>
            ))}
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(145px,1fr))",gap:12 }}>
            {rooms.filter(r => filter==="all" || r.status===filter).map(room => {
              const c = SC[room.status] || SC.available;
              return (
                <div key={room.id} onClick={() => { setSel(room); setForm({ guest:room.guest||"", checkIn:room.checkIn||today, checkInTime:room.checkInTime||"14:00", checkOut:room.checkOut||"", checkOutTime:room.checkOutTime||"12:00", rate:room.rate }); setMode("edit"); }} style={{ background:SURF,border:`1px solid ${BORD}`,borderRadius:14,padding:"15px 13px",cursor:"pointer",position:"relative",overflow:"hidden",boxShadow:"0 1px 3px rgba(0,62,0,0.05)",transition:"box-shadow 0.2s ease,transform 0.2s ease,border-color 0.2s ease" }} onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 4px 16px rgba(0,62,0,0.10)";e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.borderColor="#C8DCC8";}} onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 1px 3px rgba(0,62,0,0.05)";e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.borderColor=BORD;}}>
                  <div style={{ position:"absolute",top:0,left:0,right:0,height:3,background:c.fg,borderRadius:"14px 14px 0 0" }}/>
                  <div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:T1,marginTop:4 }}>{room.number}</div>
                  <div style={{ fontSize:9,textTransform:"uppercase",letterSpacing:"1.5px",color:T3,fontWeight:600,marginBottom:8 }}>{room.type}</div>
                  <Badge s={room.status}/>
                  {room.guest && <div style={{ fontSize:10,color:T2,marginTop:6,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" }}>{room.guest}</div>}
                  {room.checkOut && <div style={{ fontSize:9,color:T3,marginTop:2 }}>out: {room.checkOut}</div>}
                  <div style={{ fontSize:11,color:ACC,fontWeight:600,marginTop:7 }}>₱{(room.rate||0).toLocaleString()}/night</div>
                </div>
              );
            })}
          </div>

          {sel && mode === 'edit' && !warn && (
            <Modal title={`${sel.number} — ${sel.type}`} onClose={close}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14 }}>
                <Badge s={sel.status}/>
                <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                  <span style={{ color:ACC,fontSize:13 }}>₱{(sel.rate||0).toLocaleString()}/night</span>
                  <button onClick={() => setMode('editrate')} title="Edit rate" style={{ background:"none",border:"none",color:T3,cursor:"pointer",fontSize:13 }}>✎</button>
                </div>
              </div>
              {sel.guest && (
                <div style={{ background:SURF2,borderRadius:10,padding:"11px 13px",marginBottom:14 }}>
                  <div style={{ fontSize:10,color:T3,textTransform:"uppercase",letterSpacing:"1px",marginBottom:5 }}>Guest</div>
                  <div style={{ color:T1,fontWeight:500 }}>{sel.guest}</div>
                  {sel.checkIn && (
                    <div style={{ color:T3,fontSize:12,marginTop:4 }}>
                      Check-in: {sel.checkIn}{sel.checkInTime ? ` @ ${sel.checkInTime}` : ''} → Check-out: {sel.checkOut}{sel.checkOutTime ? ` @ ${sel.checkOutTime}` : ''}
                    </div>
                  )}
                </div>
              )}
              <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
                {sel.status === "available" && (
                  <>
                    <Btn v="primary" onClick={() => { setMode("checkin"); }}><Icon name="LogIn" size={13}/>Check In</Btn>
                    <Btn v="ghost" onClick={() => { setMode("reserve"); }}><Icon name="Calendar" size={13}/>Reserve</Btn>
                    <Btn v="danger" onClick={() => { upd(sel.id,{status:"maintenance",guest:null,checkIn:null,checkOut:null,checkInTime:null,checkOutTime:null}); close(); }}>Set Maintenance</Btn>
                  </>
                )}
                {sel.status === "occupied" && (
                  <>
                    <Btn v="success" onClick={() => doCheckOut(sel)}><Icon name="LogOut" size={13}/>Check Out</Btn>
                    <Btn v="ghost" onClick={() => { setForm(f => ({...f,guest:"",checkIn:sel.checkOut||today,checkInTime:"14:00",checkOut:"",checkOutTime:"12:00"})); setMode("reserve"); }}><Icon name="Calendar" size={13}/>Reserve Next</Btn>
                  </>
                )}
                {sel.status === "reserved" && (
                  <>
                    <Btn v="primary" onClick={() => { setMode("checkin"); }}><Icon name="LogIn" size={13}/>Check In Now</Btn>
                    <Btn v="ghost" onClick={() => { setForm(f => ({...f,guest:"",checkIn:sel.checkOut||today,checkInTime:"14:00",checkOut:"",checkOutTime:"12:00"})); setMode("reserve"); }}><Icon name="Calendar" size={13}/>Reserve Next Stay</Btn>
                    <Btn v="danger" onClick={() => { upd(sel.id,{status:"available",guest:null,checkIn:null,checkOut:null,checkInTime:null,checkOutTime:null}); close(); }}>Cancel Reservation</Btn>
                  </>
                )}
                {sel.status === "maintenance" && <Btn v="success" onClick={() => { upd(sel.id,{status:"available"}); close(); }}><Icon name="Check" size={13}/>Mark Available</Btn>}
              </div>
            </Modal>
          )}

          {sel && mode === 'editrate' && !warn && (
            <Modal title={`Edit Rate — ${sel.number}`} onClose={() => setMode('edit')}>
              <div style={{ background:SURF2,borderRadius:9,padding:"9px 13px",marginBottom:14,fontSize:12,color:T3 }}>Current rate: <strong style={{color:ACC}}>₱{(sel.rate||0).toLocaleString()}/night</strong></div>
              <Fld label="New Nightly Rate (₱)" type="number" value={String(form.rate||sel.rate||0)} onChange={v => { const n = clampNumber(v,0,0); upd(sel.id,{rate:n}); setSel(p => ({...p,rate:n})); setForm(f => ({...f,rate:n})); }}/>
              <div style={{ display:"flex",gap:8,marginTop:6 }}><Btn v="primary" onClick={() => setMode('edit')}><Icon name="Check" size={13}/>Done</Btn></div>
            </Modal>
          )}

          {sel && mode === "checkin" && !warn && (
            <Modal title={`Check In — ${sel.number}`} onClose={close}>
              <Fld label="Guest Name ✱" value={form.guest} onChange={v => setForm({...form,guest:v})} placeholder="Full name or group"/>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
                <Fld label="Check-in Date ✱" type="date" value={form.checkIn} onChange={v => setForm({...form,checkIn:v})}/>
                <Fld label="Check-in Time" type="time" value={form.checkInTime} onChange={v => setForm({...form,checkInTime:v})}/>
              </div>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
                <Fld label="Check-out Date ✱" type="date" value={form.checkOut} onChange={v => setForm({...form,checkOut:v})}/>
                <Fld label="Check-out Time" type="time" value={form.checkOutTime} onChange={v => setForm({...form,checkOutTime:v})}/>
              </div>
              <div style={{ fontSize:11,color:T3,marginTop:-8,marginBottom:10 }}>Date fields required. Times are optional (e.g. 2:00 PM check-in, 12:00 PM check-out).</div>
              <div style={{ display:"flex",gap:8,marginTop:6 }}><Btn v="primary" onClick={doCheckIn}><Icon name="Check" size={13}/>Confirm Check In</Btn><Btn v="ghost" onClick={close}>Cancel</Btn></div>
            </Modal>
          )}

          {sel && mode === "reserve" && !warn && (
            <Modal title={`Reserve — ${sel.number}`} onClose={close}>
              {(sel.status === 'occupied' || sel.status === 'reserved') && (
                <div style={{ background:'rgba(75,139,245,0.08)',border:'1px solid rgba(75,139,245,0.2)',borderRadius:9,padding:'8px 12px',marginBottom:14,fontSize:12,color:'#4B8BF5' }}>
                  <Icon name="Info" size={12}/> Current booking ends <strong>{sel.checkOut || '—'}</strong>. New reservation starts after that.
                </div>
              )}
              <Fld label="Guest Name ✱" value={form.guest} onChange={v => setForm({...form,guest:v})} placeholder="Full name"/>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
                <Fld label="Check-in Date ✱" type="date" value={form.checkIn} onChange={v => setForm({...form,checkIn:v})}/>
                <Fld label="Check-in Time" type="time" value={form.checkInTime} onChange={v => setForm({...form,checkInTime:v})}/>
              </div>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
                <Fld label="Check-out Date ✱" type="date" value={form.checkOut} onChange={v => setForm({...form,checkOut:v})}/>
                <Fld label="Check-out Time" type="time" value={form.checkOutTime} onChange={v => setForm({...form,checkOutTime:v})}/>
              </div>
              <div style={{ fontSize:11,color:T3,marginTop:-8,marginBottom:10 }}>Date fields required. Times are optional.</div>
              <div style={{ display:"flex",gap:8,marginTop:6 }}><Btn v="primary" onClick={doReserve}><Icon name="Calendar" size={13}/>Confirm Reservation</Btn><Btn v="ghost" onClick={close}>Cancel</Btn></div>
            </Modal>
          )}

          {warn && (
            <WarningModal
              message={warn.message}
              confirmLabel={warn.confirmLabel}
              cancelLabel={warn.cancelLabel}
              onConfirm={warn.onConfirm}
              onCancel={warn.onCancel || (() => setWarn(null))}
            />
          )}
        </div>
      );
    }

    // ── Restaurant ────────────────────────────────────────────────
    function RestaurantView({ tables, setTables, orders, setOrders, inventory, setInventory, setStockHistory, setOrderHistory }) {
      const [selTable, setSelTable] = useState(null);
      const [view, setView]         = useState("tables");
      const [mode, setMode]         = useState(null);
      const [orderItems, setOrderItems] = useState({});
      const [menuCat, setMenuCat]   = useState("All");
      const [resForm, setResForm]   = useState({ guest:"", time:"", endTime:"" });
      const [warn, setWarn]         = useState(null);

      const inventoryRef = useRef(inventory);
      useEffect(() => { inventoryRef.current = inventory; }, [inventory]);
      // BUG-01 FIX: ordersRef keeps a live snapshot of orders so updOrder Phase 2
      // can safely query remaining orders without stale closure or nested setters.
      const ordersRef = useRef(orders);
      useEffect(() => { ordersRef.current = orders; }, [orders]);

      const tableOrders = (id) => orders.filter(o => o.tableId === id && o.status !== "billed");
      
      const add = (mid) => setOrderItems(p => ({...p, [mid]:(p[mid]||0)+1}));
      const rem = (mid) => setOrderItems(p => { const n={...p}; if(n[mid]>1) n[mid]--; else delete n[mid]; return n; });
      const total = Object.entries(orderItems).reduce((s, [mid, qty]) => { const m = getMenuItem(mid); return s + (m ? m.price * qty : 0); }, 0);
      const pendingItems = Object.entries(orderItems).map(([mid, qty]) => ({ mid:parseInt(mid), qty }));
      const stockIssues = getRecipeIssues(pendingItems, inventoryRef.current);

      const placeOrder = () => {
        if (!selTable || !Object.keys(orderItems).length) return;
        const items = Object.entries(orderItems).map(([mid, qty]) => ({ mid:parseInt(mid), qty }));
        const latestInventory = inventoryRef.current;
        const issues = getRecipeIssues(items, latestInventory);
        if (issues.length) { alert(`Insufficient bar stock: ${issues.map(i => `${i.name} (${i.available}/${i.qty} ${BAR_RECIPE_UNITS[i.unit]||i.unit})`).join(", ")}`); return; }
        const now = new Date().toLocaleTimeString("en-PH", { hour:"2-digit", minute:"2-digit" });
        const o = { id:Date.now(), tableId:selTable.id, items, status:"preparing", time:now };
        
        setOrders(p => [...p, o]);
        
        if (items.some(i => getRecipe(i.mid).length)) {
          setInventory(prev => applyRecipeConsumption(prev, items));
          setStockHistory(p => [...p, ...buildConsumptionHistory(items, latestInventory, selTable.id)]);
        }
        setTables(p => p.map(t => t.id === selTable.id ? { ...t, status:"occupied", res: t.res ? t.res : { guest:"Walk-in", time:now, endTime:"" } } : t));
        setOrderItems({}); setMode(null); setSelTable(null); setMenuCat("All");
      };

      const doReserve = () => {
        if (!selTable || !resForm.guest.trim() || !resForm.time) return;
        if (tableOrders(selTable.id).length > 0) { alert('This table already has an active order.'); return; }
        if (selTable.status === 'reserved' && selTable.res?.time) {
          const conflicts = timesOverlap(selTable.res.time, selTable.res.endTime || null, resForm.time, resForm.endTime || null);
          if (conflicts) {
            const existing = `${selTable.res.time}${selTable.res.endTime ? '–' + selTable.res.endTime : ''}`;
            setWarn({
              message: `Table ${selTable.number} has a reservation at ${existing}. New slot at ${resForm.time}${resForm.endTime?'–'+resForm.endTime:''} may overlap — proceed?`,
              onConfirm: () => { performReserve(); setWarn(null); },
            });
            return;
          }
        }
        if (selTable.status === 'occupied') {
          setWarn({
            message: `Table ${selTable.number} is currently occupied. Do you want to add a future reservation for ${resForm.time}?`,
            onConfirm: () => { performReserve(); setWarn(null); },
          });
          return;
        }
        performReserve();
      };

      // BUG-02 FIX: capture selTable.id before the closure to avoid stale reference on rapid taps
      const performReserve = () => {
        const tableId = selTable?.id;
        if (!tableId) return;
        setTables(p => p.map(t => t.id === tableId ? { ...t, status:"reserved", res:{ guest:resForm.guest, time:resForm.time, endTime:resForm.endTime } } : t));
        setResForm({ guest:"", time:"", endTime:"" }); setMode(null); setSelTable(null); setWarn(null);
      };

      const nextStatus = { preparing:"serving", serving:"served", served:"billed" };
      const nextLabel  = { preparing:"Mark Serving", serving:"Mark Served", served:"Bill Out" };

      // BUG-01 FIX: Two-phase billing — extract order data BEFORE entering any setter
      // to eliminate stale-closure risk. setTables uses ordersRef (a live ref) to check
      // remaining orders without nesting setters or reading stale closure state.
      const updOrder = (id, status) => {
        if (status === "billed") {
          const billedAt = new Date().toISOString();
          // Phase 1: remove order from active list and push to history atomically
          setOrders(prevOrders => {
            const order = prevOrders.find(o => o.id === id);
            if (order) {
              setOrderHistory(h => [...h, { ...order, status: "billed", billedAt }]);
            }
            return prevOrders.filter(o => o.id !== id);
          });
          // Phase 2: use ordersRef (kept current by useEffect) to query remaining orders
          // without any stale closure or nested setState call.
          setTables(prevTables =>
            prevTables.map(table => {
              const latestOrders = ordersRef.current || [];
              const remaining = latestOrders.filter(
                o => o.tableId === table.id && o.id !== id
              );
              const wasOwner = latestOrders.some(
                o => o.tableId === table.id && o.id === id
              );
              if (wasOwner && remaining.length === 0) {
                return { ...table, status: "available", res: null };
              }
              return table;
            })
          );
        } else {
          setOrders(prev => prev.map(o => o.id === id ? { ...o, status } : o));
        }
      };

      const close = () => { setSelTable(null); setMode(null); setOrderItems({}); setMenuCat("All"); setWarn(null); };
      const filteredMenu = menuCat === "All" ? MENU : MENU.filter(m => m.cat === menuCat);

      return (
        <div>
          <div style={{ display:"flex",gap:4,background:SURF2,borderRadius:10,padding:4,marginBottom:18,width:"fit-content" }}>
            {["tables","orders"].map(v => (
              <button key={v} onClick={() => setView(v)} style={{ padding:"7px 18px",borderRadius:7,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:500,background:view===v?SURF:"transparent",color:view===v?ACC:T3,textTransform:"capitalize" }}>{v === "tables" ? "Tables" : "Orders"}</button>
            ))}
          </div>

          {view === "tables" && (
            <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:12 }}>
              {tables.map(t => {
                const c = SC[t.status] || SC.available;
                const activeOrders = tableOrders(t.id);
                const orderCount = activeOrders.length;
                const totalBill = activeOrders.reduce((sum, o) => sum + calcTotal(o.items), 0);
                return (
                  <div key={t.id} role="button" tabIndex={0} onClick={() => { setSelTable(t); setMode(null); }} onKeyDown={e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); setSelTable(t); setMode(null); } }} style={{ background:SURF,border:`1px solid ${BORD}`,borderRadius:14,padding:14,cursor:"pointer",position:"relative",overflow:"hidden",boxShadow:"0 1px 3px rgba(0,62,0,0.05)",transition:"box-shadow 0.2s ease,transform 0.2s ease,border-color 0.2s ease" }} onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 4px 16px rgba(0,62,0,0.10)";e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.borderColor="#C8DCC8";}} onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 1px 3px rgba(0,62,0,0.05)";e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.borderColor=BORD;}}>
                    <div style={{ position:"absolute",top:0,left:0,right:0,height:3,background:c.fg,borderRadius:"14px 14px 0 0" }}/>
                    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7,marginTop:4 }}>
                      <div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:T1,lineHeight:1 }}>T{t.number}</div>
                      <div style={{ fontSize:10,color:T3 }}>{t.cap} pax</div>
                    </div>
                    <div style={{ display:"flex", gap: 4, alignItems: "center" }}>
                      <Badge s={t.status}/>
                      {orderCount > 1 && <span style={{ background: ACC, color: "#FFF", borderRadius: "50%", width: 16, height: 16, fontSize: 9, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: "bold" }} title={`${orderCount} active orders`}>{orderCount}</span>}
                    </div>
                    {t.res && <div style={{ fontSize:10,color:T3,marginTop:5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{t.res.guest} {t.res.time && `· ${t.res.time}`}{t.res.endTime&&`–${t.res.endTime}`}</div>}
                    {orderCount > 0 && <div style={{ fontSize:11,color:ACC,marginTop:5,fontWeight:600 }}>₱{totalBill.toLocaleString()}</div>}
                  </div>
                );
              })}
            </div>
          )}

          {view === "orders" && (
            <div>
              {["preparing","serving","served"].map(status => {
                const grp = orders.filter(o => o.status === status);
                if (!grp.length) return null;
                return (
                  <div key={status} style={{ marginBottom:20 }}>
                    <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:10 }}><Badge s={status}/><span style={{ color:T3,fontSize:12 }}>({grp.length})</span></div>
                    {grp.map(o => (
                      <div key={o.id} style={{ background:SURF,border:`1px solid ${BORD}`,borderRadius:10,padding:14,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
                        <div>
                          <div style={{ fontWeight:600,color:T1,marginBottom:6 }}>Table {o.tableId} <span style={{ color:T3,fontSize:12,fontWeight:400 }}>· {o.time}</span></div>
                          {o.items.map(item => { const m = getMenuItem(item.mid); return m ? <div key={item.mid} style={{ fontSize:12,color:T3 }}>{item.qty}× {m.name} — ₱{(m.price*item.qty).toLocaleString()}</div> : null; })}
                          <div style={{ color:ACC,fontWeight:600,marginTop:6,fontSize:13 }}>Total: ₱{calcTotal(o.items).toLocaleString()}</div>
                        </div>
                        <Btn v="primary" sz="sm" onClick={() => updOrder(o.id, nextStatus[status])}>{nextLabel[status]}</Btn>
                      </div>
                    ))}
                  </div>
                );
              })}
              {!orders.filter(o => ["preparing","serving","served"].includes(o.status)).length && <div style={{ color:T3,textAlign:"center",padding:"40px 0",fontSize:14 }}>No active orders</div>}
            </div>
          )}

          {selTable && !mode && !warn && (
            <Modal title={`Table ${selTable.number} — ${selTable.cap} pax`} onClose={close}>
              <div style={{ marginBottom:14 }}><Badge s={selTable.status}/></div>
              {selTable.res && (
                <div style={{ background:SURF2,borderRadius:10,padding:"10px 13px",marginBottom:13 }}>
                  <div style={{ color:T1,fontSize:13 }}>{selTable.res.guest}</div>
                  {selTable.res.time && <div style={{ color:T3,fontSize:11,marginTop:3 }}>Time: {selTable.res.time}{selTable.res.endTime ? ` – ${selTable.res.endTime}` : ''}</div>}
                </div>
              )}
              
              {tableOrders(selTable.id).map((order, orderIdx) => (
                <div key={order.id} style={{ background:SURF2,borderRadius:10,padding:"10px 13px",marginBottom:13, borderLeft: `3px solid ${SC[order.status]?.fg || ACC}` }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
                    <div style={{ fontSize:11,color:T1,fontWeight:600 }}>Order #{orderIdx + 1} <span style={{ color:T3,fontSize:10,fontWeight:400 }}>({order.time})</span></div>
                    <Badge s={order.status}/>
                  </div>
                  {order.items.map(item => { const m = getMenuItem(item.mid); return m ? <div key={item.mid} style={{ fontSize:12,color:T2,marginBottom:2 }}>{item.qty}× {m.name}</div> : null; })}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 7, borderTop: `1px solid ${BORD}`, paddingTop: 6 }}>
                    <span style={{ color:ACC,fontWeight:600, fontSize: 13 }}>₱{calcTotal(order.items).toLocaleString()}</span>
                    <Btn v="blue" sz="sm" onClick={() => updOrder(order.id, nextStatus[order.status])}>{nextLabel[order.status]}</Btn>
                  </div>
                </div>
              ))}
              
              <div style={{ display:"flex",gap:8,flexWrap:"wrap", marginTop: 14 }}>
                <Btn v="primary" onClick={() => { setOrderItems({}); setMode("order"); setMenuCat("All"); }}><Icon name="Plus" size={13}/>New Order</Btn>
                {(selTable.status === "available" || selTable.status === "occupied" || selTable.status === "reserved") && (
                  <Btn v="ghost" onClick={() => setMode("reserve")}><Icon name="Calendar" size={13}/>Reserve</Btn>
                )}
                {selTable.status === "reserved" && (
                  <Btn v="danger" onClick={() => { setTables(p => p.map(t => t.id === selTable.id ? {...t,status:"available",res:null} : t)); close(); }}>Cancel Reservation</Btn>
                )}
              </div>
            </Modal>
          )}

          {selTable && mode === "order" && (
            <Modal title={`New Order — Table ${selTable.number}`} onClose={close} wide>

    // ── Lake Cruise Module ──────────────────────────────────────────
    function CruiseView({ cruises, setCruises }) {
      const [showAdd, setShowAdd] = useState(false);
      const [form, setForm] = useState({ name: "", date: today, time: "08:00", heads: "20" });

      const calculatedCost = useMemo(() => {
        const headsVal = clampNumber(form.heads, 1, 1);
        if (headsVal <= 20) return 1500;
        return 1500 + ((headsVal - 20) * 75);
      }, [form.heads]);

      // BUG-07 FIX: re-compute cost at save time from clamped heads (not from stale memo)
      // to prevent empty-string edge case where memo returns 1500 for 0-head input.
      const saveCruise = () => {
        if (!form.name.trim()) { alert("Reservation Name is required."); return; }
        const headsVal = Math.max(1, clampNumber(form.heads, 1, 1));
        const finalCost = headsVal <= 20 ? 1500 : 1500 + ((headsVal - 20) * 75);
        const item = {
          id: Date.now(),
          name: form.name.trim(),
          date: form.date || today,
          time: form.time || "08:00",
          heads: headsVal,
          cost: finalCost
        };
        setCruises(prev => [...prev, item]);
        setForm({ name: "", date: today, time: "08:00", heads: "20" });
        setShowAdd(false);
      };

      const removeCruise = (id) => {
        if (window.confirm("Remove this lake cruise booking?")) {
          setCruises(prev => prev.filter(c => c.id !== id));
        }
      };

      const todayTrips = useMemo(() => cruises.filter(c => c.date === today), [cruises]);
      const totalRevenue = useMemo(() => todayTrips.reduce((sum, c) => sum + c.cost, 0), [todayTrips]);

      return (
        <div>
          <div className="dashboard-stats">
            <StatCard label="Trips Booked Today" value={todayTrips.length} sub="Scheduled runs" color="#22C27A" />
            <StatCard label="Today's Cruise Revenue" value={`₱${totalRevenue.toLocaleString()}`} sub="Based on passenger distribution" color={ACC} />
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <span style={{ color: T2, fontSize: 13 }}>Lake Cruise Logbook</span>
            <Btn v="primary" sz="sm" onClick={() => setShowAdd(true)}><Icon name="Plus" size={12} />Add Cruise</Btn>
          </div>

          <Card>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1.2fr 1.2fr 1fr 1.2fr 40px", padding: "8px 0", borderBottom: `1px solid ${BORD}`, fontSize: 10, textTransform: "uppercase", letterSpacing: "1px", color: T3, marginBottom: 4 }}>
              <div>Reservation Name</div><div>Date</div><div>Time Slot</div><div>Heads</div><div>Amount Due</div><div></div>
            </div>
            {cruises.slice().reverse().map(c => (
              <div key={c.id} style={{ display: "grid", gridTemplateColumns: "2fr 1.2fr 1.2fr 1fr 1.2fr 40px", padding: "11px 0", borderBottom: `1px solid ${SURF2}`, alignItems: "center", fontSize: 13 }}>
                <div style={{ color: T1, fontWeight: 500 }}>{c.name}</div>
                <div style={{ color: T2 }}>{c.date}</div>
                <div style={{ color: T2 }}>{c.time}</div>
                <div style={{ color: T1 }}>{c.heads} pax</div>
                <div style={{ color: ACC, fontWeight: 600 }}>₱{c.cost.toLocaleString()}</div>
                <button onClick={() => removeCruise(c.id)} style={{ background: "none", border: "none", color: T3, cursor:"pointer", padding: 0 }} title="Delete schedule"><Icon name="Trash2" size={13} /></button>
              </div>
            ))}
            {!cruises.length && <div style={{ color: T3, textAlign: "center", padding: "30px 0", fontSize: 13 }}>No lake cruises logged in this register profile</div>}
          </Card>

          {showAdd && (
            <Modal title="Log New Lake Cruise Reservation" onClose={() => setShowAdd(false)}>
              <Fld label="Reservation Group / Name" value={form.name} onChange={v => setForm({ ...form, name: v })} placeholder="e.g. Alunan Family Tour" />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <Fld label="Target Cruise Date" type="date" value={form.date} onChange={v => setForm({ ...form, date: v })} />
                <Fld label="Target Time Slot" type="time" value={form.time} onChange={v => setForm({ ...form, time: v })} />
              </div>
              <Fld label="Number of Heads (Passengers)" type="number" value={form.heads} onChange={v => setForm({ ...form, heads: v })} />
              
              <div style={{ background: SURF2, borderRadius: 10, padding: 12, marginBottom: 14 }}>
                <div style={{ fontSize: 10, color: T3, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 4 }}>Live Cost Calculation Matrix</div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 12, color: T2 }}>Standard Base Rate Matrix: ₱1,500 (20 pax limits)</span>
                  <span style={{ fontSize: 16, fontWeight: 700, color: ACC }}>₱{calculatedCost.toLocaleString()}</span>
                </div>
                {clampNumber(form.heads, 1, 1) > 20 && (
                  <div style={{ fontSize: 11, color: "#B8860B", marginTop: 4 }}>
                    ⚠️ Scaled Extra Count: {clampNumber(form.heads, 1, 1) - 20} heads detected. Adding ₱75 per additional occupant.
                  </div>
                )}
              </div>

              <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                <Btn v="primary" onClick={saveCruise}><Icon name="Check" size={13} />Book Trip</Btn>
                <Btn v="ghost" onClick={() => setShowAdd(false)}>Cancel</Btn>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ── Pool ──────────────────────────────────────────────────────
    function PoolView({ pool, setPool }) {
      const [view, setView]               = useState("overview");
      const [showPass, setShowPass]   = useState(false);
      const [showMaint, setShowMaint] = useState(false);
      const [pf, setPf] = useState({ name:"", count:"1", type:"Day Pass" });
      const [mf, setMf] = useState({ task:"", date:today, status:"scheduled" });
      const pct = Math.round((pool.curGuests / pool.maxCap) * 100);
      const col = pct >= 80 ? "#DC4444" : pct >= 60 ? "#D4A036" : "#22C27A";
      const r = 60; const circ = 2 * Math.PI * r;
      const addPass = () => {
        if (!pf.name.trim()) { alert('Please enter a guest or group name.'); return; }
        const parsed = parseInt(pf.count, 10);
        if (!Number.isFinite(parsed) || parsed < 1) { alert('Number of guests must be at least 1.'); return; }
        const cnt = parsed;
        const spotsLeft = Math.max(0, pool.maxCap - pool.curGuests);
        if (cnt > spotsLeft) { alert(`Not enough capacity. Only ${spotsLeft} spot${spotsLeft !== 1 ? 's' : ''} remaining.`); return; }
        const now = new Date().toLocaleTimeString("en-PH", { hour:"2-digit", minute:"2-digit" });
        setPool(p => ({ ...p, curGuests:Math.min(p.maxCap, p.curGuests + cnt), passes:[...p.passes, { id:Date.now(), name:pf.name.trim(), count:cnt, time:now, type:pf.type }] }));
        setPf({ name:"", count:"1", type:"Day Pass" }); setShowPass(false);
      };
      const remPass  = (pass) => setPool(p => ({ ...p, curGuests:Math.max(0, p.curGuests - pass.count), passes:p.passes.filter(x => x.id !== pass.id) }));
      const addMaint = () => { if (!mf.task.trim() || !validDateValue(mf.date)) return; setPool(p => ({ ...p, maintenance:[...p.maintenance, { id:Date.now(), ...mf, task:mf.task.trim() }] })); setMf({ task:"", date:today, status:"scheduled" }); setShowMaint(false); };
      const toggleMaint = (id) => setPool(p => ({ ...p, maintenance:p.maintenance.map(m => m.id === id ? { ...m, status:m.status==="done"?"scheduled":"done" } : m) }));
      return (
        <div>
          <div style={{ display:"flex",gap:4,background:SURF2,borderRadius:10,padding:4,marginBottom:18,width:"fit-content" }}>
            {["overview","passes","maintenance"].map(v => (
              <button key={v} onClick={() => setView(v)} style={{ padding:"7px 16px",borderRadius:7,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:500,background:view===v?SURF:"transparent",color:view===v?ACC:T3,textTransform:"capitalize" }}>{v}</button>
            ))}
          </div>
          {view === "overview" && (
            <div className="pool-grid">
              <Card>
                <div style={{ textAlign:"center" }}>
                  <div style={{ position:"relative",width:150,height:150,margin:"0 auto 14px" }}>
                    <svg width="150" height="150" viewBox="0 0 150 150">
                      <circle cx="75" cy="75" r={r} fill="none" stroke={BORD} strokeWidth={11}/>
                      <circle cx="75" cy="75" r={r} fill="none" stroke={col} strokeWidth={11} strokeDasharray={`${(pct/100)*circ} ${circ}`} strokeLinecap="round" style={{ transform:"rotate(-90deg)",transformOrigin:"75px 75px" }}/>
                    </svg>
                    <div style={{ position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center" }}>
                      <div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:34,fontWeight:700,color:col,lineHeight:1 }}>{pct}%</div>
                      <div style={{ fontSize:9,color:T3,marginTop:4,textTransform:"uppercase",letterSpacing:"1px" }}>Capacity</div>
                    </div>
                  </div>
                  <div style={{ fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:T1 }}>{pool.curGuests}</div>
                  <div style={{ fontSize:11,color:T3 }}>of {pool.maxCap} guests</div>
                  <div style={{ marginTop:14 }}><Btn v="primary" sz="sm" onClick={() => setShowPass(true)} full><Icon name="Plus" size={12}/>Add Guests</Btn></div>
                </div>
              </Card>
              <div className="pool-cards">
                {[{l:"Current Guests",v:pool.curGuests,c:"#22C27A"},{l:"Spots Left",v:pool.maxCap-pool.curGuests,c:"#007A00"},{l:"Day Passes",v:pool.passes.filter(p=>p.type==="Day Pass").reduce((s,p)=>s+p.count,0),c:"#D4A036"},{l:"Hotel Guests",v:pool.passes.filter(p=>p.type==="Hotel Guest").reduce((s,p)=>s+p.count,0),c:"#A066D3"}].map(s => <StatCard key={s.l} label={s.l} value={s.v} color={s.c}/>)}
              </div>
            </div>
          )}
          {view === "passes" && (
            <div>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14 }}>
                <span style={{ color:T2,fontSize:13 }}>Active Pool Passes Today</span>
                <Btn v="primary" sz="sm" onClick={() => setShowPass(true)}><Icon name="Plus" size={12}/>Add Pass</Btn>
              </div>
              <Card>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 70px 90px 70px 30px",padding:"8px 0",borderBottom:`1px solid ${BORD}`,fontSize:10,textTransform:"uppercase",letterSpacing:"1px",color:T3,marginBottom:4 }}>
                  <div>Name</div><div>Guests</div><div>Type</div><div>Time</div><div></div>
                </div>
                {pool.passes.map(p => (
                  <div key={p.id} style={{ display:"grid",gridTemplateColumns:"1fr 70px 90px 70px 30px",padding:"10px 0",borderBottom:`1px solid ${SURF2}`,alignItems:"center",fontSize:13 }}>
                    <div style={{ color:T1 }}>{p.name}</div>
                    <div style={{ color:T1,fontWeight:600 }}>{p.count}</div>
                    <div><Badge s={p.type==="Hotel Guest"?"occupied":"reserved"} label={p.type}/></div>
                    <div style={{ color:T3 }}>{p.time}</div>
                    <button onClick={() => remPass(p)} style={{ background:"none",border:"none",color:T3,cursor:"pointer",padding:0 }}><Icon name="X" size={13}/></button>
                  </div>
                ))}
                {!pool.passes.length && <div style={{ color:T3,textAlign:"center",padding:"20px 0",fontSize:13 }}>No active passes</div>}
              </Card>
            </div>
          )}
          {view === "maintenance" && (
            <div>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14 }}>
                <span style={{ color:T2,fontSize:13 }}>Maintenance Schedule</span>
                <Btn v="primary" sz="sm" onClick={() => setShowMaint(true)}><Icon name="Plus" size={12}/>Add Task</Btn>
              </div>
              <Card>
                {pool.maintenance.map(m => (
                  <div key={m.id} style={{ display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:`1px solid ${SURF2}` }}>
                    <button onClick={() => toggleMaint(m.id)} style={{ width:20,height:20,borderRadius:5,border:`2px solid ${m.status==="done"?"#22C27A":BORD}`,background:m.status==="done"?"#22C27A":"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center" }}>
                      {m.status === "done" && <Icon name="Check" size={11} color={BG}/>}
                    </button>
                    <div style={{ flex:1,color:m.status==="done"?T3:T1,fontSize:13,textDecoration:m.status==="done"?"line-through":"none" }}>{m.task}</div>
                    <div style={{ fontSize:12,color:T3 }}>{m.date}</div>
                    <Badge s={m.status}/>
                  </div>
                ))}
              </Card>
            </div>
          )}
          {showPass && (
            <Modal title="Add Pool Guests" onClose={() => setShowPass(false)}>
              <div style={{ background:SURF2,borderRadius:9,padding:"8px 12px",marginBottom:14,fontSize:12,color:T3 }}>{pool.curGuests} / {pool.maxCap} — {pool.maxCap-pool.curGuests} spots available</div>
              <Fld label="Name / Group"     value={pf.name}  onChange={v => setPf({...pf,name:v})} placeholder="Guest or group name"/>
              <Fld label="Number of Guests" type="number" value={pf.count} onChange={v => setPf({...pf,count:v})}/>
              <Sel label="Pass Type"        value={pf.type}  onChange={v => setPf({...pf,type:v})} opts={["Day Pass","Hotel Guest"]}/>
              <div style={{ display:"flex",gap:8,marginTop:6 }}><Btn v="primary" onClick={addPass}><Icon name="Check" size={13}/>Add to Pool</Btn><Btn v="ghost" onClick={() => setShowPass(false)}>Cancel</Btn></div>
            </Modal>
          )}
          {showMaint && (
            <Modal title="Add Maintenance Task" onClose={() => setShowMaint(false)}>
              <Fld label="Task" value={mf.task} onChange={v => setMf({...mf,task:v})} placeholder="e.g. pH Level Check"/>
              <Fld label="Date" type="date" value={mf.date} onChange={v => setMf({...mf,date:v})}/>
              <Sel label="Status" value={mf.status} onChange={v => setMf({...mf,status:v})} opts={[{v:"scheduled",l:"Scheduled"},{v:"done",l:"Done"}]}/>
              <div style={{ display:"flex",gap:8,marginTop:6 }}><Btn v="primary" onClick={addMaint}><Icon name="Check" size={13}/>Add Task</Btn><Btn v="ghost" onClick={() => setShowMaint(false)}>Cancel</Btn></div>
            </Modal>
          )}
        </div>
      );
